<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Energy Allocation by Project</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #ccc; font-family: system-ui, -apple-system, sans-serif; }
  h1 { padding: 24px 32px 4px; font-size: 18px; font-weight: 500; color: #eee; }
  .subtitle { padding: 0 32px 16px; font-size: 13px; color: #888; }
  #chart { width: 100%; height: 420px; }
  #legend { display: flex; flex-wrap: wrap; gap: 6px 16px; padding: 8px 32px 24px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; opacity: 0.9; }
  .legend-item:hover { opacity: 1; }
  .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }
  #tooltip { position: absolute; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 10px 14px; font-size: 12px; pointer-events: none; display: none; z-index: 10; }
  #tooltip .day { color: #aaa; margin-bottom: 6px; }
  #tooltip .row { display: flex; justify-content: space-between; gap: 20px; margin: 2px 0; }
  #tooltip .count { color: #eee; font-weight: 600; }
  #heatmap { padding: 0 32px 24px; }
  #heatmap h2 { font-size: 15px; font-weight: 500; margin-bottom: 12px; color: #ddd; }
  .heatmap-grid { display: flex; gap: 3px; }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell { width: 22px; height: 22px; border-radius: 3px; }
  .heatmap-label { font-size: 10px; color: #666; text-align: center; margin-top: 4px; }
  .heatmap-row-label { font-size: 10px; color: #666; width: 100px; display: flex; align-items: center; }
  #bar-chart { padding: 0 32px 32px; }
  #bar-chart h2 { font-size: 15px; font-weight: 500; margin-bottom: 12px; color: #ddd; }
  .bar-row { display: flex; align-items: center; margin: 3px 0; }
  .bar-label { width: 160px; font-size: 12px; text-align: right; padding-right: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 20px; background: #151520; border-radius: 3px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .bar-count { position: absolute; right: 6px; top: 2px; font-size: 11px; color: #999; }
</style>
</head>
<body>
<h1>Energy Allocation by Project</h1>
<div class="subtitle">Events (research, milestones, changelog) per day &mdash; March 2026</div>
<svg id="chart"></svg>
<div id="legend"></div>
<div id="tooltip"></div>

<div id="bar-chart">
  <h2>Total Events by Project</h2>
</div>

<div id="heatmap">
  <h2>Daily Activity Heatmap (top projects)</h2>
</div>

<script>
// Inline data — generated from changelog + milestones + research-log
const RAW_DATA = {"days": [{"day": "2026-03-02", "projects": [{"project": "foveated-vision", "count": 13}, {"project": "peripheral-color", "count": 24}, {"project": "unknown", "count": 1}, {"project": "visual-clutter", "count": 13}, {"project": "zui", "count": 1}]}, {"day": "2026-03-03", "projects": [{"project": "andyed", "count": 22}, {"project": "liquid-light-warp", "count": 2}, {"project": "psychodeli-webgl-port", "count": 17}, {"project": "scrutinizer-www", "count": 34}, {"project": "scrutinizer2025", "count": 114}]}, {"day": "2026-03-04", "projects": [{"project": "andyed", "count": 20}, {"project": "clicksense", "count": 2}, {"project": "psychodeli-webgl-port", "count": 2}, {"project": "sciprogfi-web", "count": 95}, {"project": "scrutinizer-www", "count": 6}, {"project": "scrutinizer2025", "count": 64}]}, {"day": "2026-03-05", "projects": [{"project": "andyed", "count": 55}, {"project": "arxiv-paper", "count": 2}, {"project": "iblipper2025", "count": 1}, {"project": "marginalia", "count": 1}, {"project": "psychodeli-webgl-port", "count": 1}, {"project": "sciprogfi-web", "count": 1}, {"project": "scrutinizer-www", "count": 9}, {"project": "scrutinizer2025", "count": 15}]}, {"day": "2026-03-06", "projects": [{"project": "andyed", "count": 26}, {"project": "arxiv-paper", "count": 58}, {"project": "fovi", "count": 39}, {"project": "iblipper2025", "count": 1}, {"project": "image", "count": 1}, {"project": "psychodeli-webgl-port", "count": 1}, {"project": "research", "count": 4}, {"project": "rosenholtz", "count": 7}, {"project": "sciprogfi-web", "count": 1}, {"project": "scrutinizer-www", "count": 1}, {"project": "scrutinizer2025", "count": 33}]}, {"day": "2026-03-07", "projects": [{"project": "andyed", "count": 49}, {"project": "interests2025", "count": 4}, {"project": "marginalia", "count": 1}, {"project": "sciprogfi-web", "count": 2}, {"project": "scrutinizer-www", "count": 3}, {"project": "scrutinizer2025", "count": 64}]}, {"day": "2026-03-08", "projects": [{"project": "andyed", "count": 10}, {"project": "arxiv-paper", "count": 1}, {"project": "psychodeli-webgl-port", "count": 10}, {"project": "sciprogfi-web", "count": 4}, {"project": "scrutinizer-www", "count": 6}, {"project": "scrutinizer2025", "count": 65}]}, {"day": "2026-03-09", "projects": [{"project": "andyed", "count": 9}, {"project": "blog", "count": 2}, {"project": "claude-code-history-viewer", "count": 1}, {"project": "iblipper2025", "count": 2}, {"project": "psychodeli-webgl-port", "count": 2}, {"project": "sciprogfi-web", "count": 4}, {"project": "scrutinizer-repo", "count": 1}, {"project": "scrutinizer-www", "count": 12}, {"project": "scrutinizer2025", "count": 17}]}, {"day": "2026-03-10", "projects": [{"project": "ScreenSaverMinimal", "count": 1}, {"project": "andyed", "count": 154}, {"project": "blog", "count": 1}, {"project": "checkout-error-states", "count": 2}, {"project": "oriented-dog-phase1", "count": 2}, {"project": "psychodeli-osx-vx", "count": 1}, {"project": "psychodeli-webgl-port", "count": 3}, {"project": "scrutinizer-www", "count": 18}, {"project": "scrutinizer2025", "count": 51}, {"project": "src", "count": 12}, {"project": "v2.2", "count": 1}]}, {"day": "2026-03-11", "projects": [{"project": "andyed", "count": 3}, {"project": "scrutinizer-www", "count": 6}, {"project": "scrutinizer2025", "count": 124}]}, {"day": "2026-03-12", "projects": [{"project": "andyed", "count": 12}, {"project": "liquid-light-warp", "count": 1}, {"project": "psychodeli-osx-vx", "count": 1}, {"project": "psychodeli-webgl-port", "count": 3}, {"project": "scrutinizer-www", "count": 24}, {"project": "scrutinizer2025", "count": 22}, {"project": "vroom", "count": 53}]}, {"day": "2026-03-13", "projects": [{"project": "andyed", "count": 38}, {"project": "psychodeli-webgl-port", "count": 9}, {"project": "scrutinizer-www", "count": 16}, {"project": "scrutinizer2025", "count": 84}]}, {"day": "2026-03-14", "projects": [{"project": "andyed", "count": 12}, {"project": "psychodeli-webgl-port", "count": 2}, {"project": "scrutinizer-www", "count": 3}, {"project": "scrutinizer2025", "count": 35}, {"project": "tmp", "count": 1}]}, {"day": "2026-03-15", "projects": [{"project": "andyed", "count": 17}, {"project": "psychodeli-webgl-port", "count": 4}, {"project": "sciprogfi-web", "count": 2}, {"project": "scrutinizer-www", "count": 4}, {"project": "scrutinizer2025", "count": 55}]}, {"day": "2026-03-16", "projects": [{"project": "andyed", "count": 3}, {"project": "psychodeli-metal", "count": 3}, {"project": "psychodeli-webgl-port", "count": 1}, {"project": "sciprogfi", "count": 1}, {"project": "sciprogfi-web", "count": 1}, {"project": "scrutinizer2025", "count": 23}]}, {"day": "2026-03-17", "projects": [{"project": "andyed", "count": 2}, {"project": "psychodeli-plus-tvos", "count": 31}, {"project": "psychodeli-webgl-port", "count": 4}, {"project": "scrutinizer2025", "count": 20}]}, {"day": "2026-03-18", "projects": [{"project": "andyed", "count": 2}, {"project": "fisheye-menu", "count": 5}, {"project": "psychodeli-plus-tvos", "count": 43}, {"project": "psychodeli-webgl-port", "count": 4}, {"project": "screenshots", "count": 1}, {"project": "scrutinizer2025", "count": 20}]}, {"day": "2026-03-19", "projects": [{"project": "psychodeli-plus-tvos", "count": 104}, {"project": "psychodeli-webgl-port", "count": 1}, {"project": "scrutinizer2025", "count": 10}]}, {"day": "2026-03-20", "projects": [{"project": "andyed", "count": 2}, {"project": "arxiv-paper", "count": 3}, {"project": "images", "count": 18}, {"project": "pixelbop", "count": 25}, {"project": "psychodeli-plus-tvos", "count": 28}, {"project": "psychodeli-webgl-port", "count": 2}, {"project": "scrutinizer2025", "count": 17}]}, {"day": "2026-03-21", "projects": [{"project": "andyed", "count": 29}, {"project": "arxiv-paper", "count": 45}, {"project": "images", "count": 12}, {"project": "inside_the_math", "count": 1}, {"project": "psychodeli-plus-firetv", "count": 3}, {"project": "psychodeli-plus-tvos", "count": 1}, {"project": "psychodeli-webgl-port", "count": 4}, {"project": "scrutinizer-www", "count": 2}, {"project": "scrutinizer2025", "count": 5}]}, {"day": "2026-03-22", "projects": [{"project": "andyed", "count": 162}, {"project": "c9watch", "count": 2}, {"project": "claude-code-session-bridge", "count": 1}, {"project": "interests2025", "count": 95}, {"project": "psychodeli-plus-firetv", "count": 2}, {"project": "psychodeli-plus-tvos", "count": 3}, {"project": "psychodeli-webgl-port", "count": 5}, {"project": "scrutinizer-www", "count": 49}, {"project": "scrutinizer2025", "count": 22}, {"project": "session-bridge", "count": 2}, {"project": "substrate-tests", "count": 5}]}, {"day": "2026-03-23", "projects": [{"project": "oled-fireworks-firetv", "count": 10}, {"project": "psychodeli-plus-firetv", "count": 8}, {"project": "scrutinizer-www", "count": 6}, {"project": "scrutinizer2025", "count": 12}]}, {"day": "2026-03-24", "projects": [{"project": "andyed", "count": 4}, {"project": "clicksense", "count": 34}, {"project": "cymatics-firetv", "count": 2}, {"project": "interests2025", "count": 2}, {"project": "oled-fireworks-tvos", "count": 142}, {"project": "psychodeli-webgl-port", "count": 46}, {"project": "scrutinizer2025", "count": 10}]}, {"day": "2026-03-25", "projects": [{"project": "andyed", "count": 128}, {"project": "claude-code-session-bridge", "count": 4}, {"project": "clicksense", "count": 10}, {"project": "psychodeli-webgl-port", "count": 2}, {"project": "science-agent", "count": 2}, {"project": "scrutinizer2025", "count": 84}]}], "projects": ["ScreenSaverMinimal", "andyed", "arxiv-paper", "blog", "c9watch", "checkout-error-states", "claude-code-history-viewer", "claude-code-session-bridge", "clicksense", "cymatics-firetv", "fisheye-menu", "foveated-vision", "fovi", "iblipper2025", "image", "images", "inside_the_math", "interests2025", "liquid-light-warp", "marginalia", "oled-fireworks-firetv", "oled-fireworks-tvos", "oriented-dog-phase1", "peripheral-color", "pixelbop", "psychodeli-metal", "psychodeli-osx-vx", "psychodeli-plus-firetv", "psychodeli-plus-tvos", "psychodeli-webgl-port", "research", "rosenholtz", "science-agent", "sciprogfi", "sciprogfi-web", "screenshots", "scrutinizer-repo", "scrutinizer-www", "scrutinizer2025", "session-bridge", "src", "substrate-tests", "tmp", "unknown", "v2.2", "visual-clutter", "vroom", "zui"]};

// Project grouping: cluster small projects
const PROJECT_GROUPS = {
  'scrutinizer': ['scrutinizer2025', 'scrutinizer-www', 'scrutinizer-repo', 'visual-clutter', 'rosenholtz', 'foveated-vision'],
  'psychodeli': ['psychodeli-webgl-port', 'psychodeli-plus-tvos', 'psychodeli-plus-firetv', 'psychodeli-metal', 'psychodeli-osx-vx'],
  'oled-fireworks': ['oled-fireworks-tvos', 'oled-fireworks-firetv', 'ScreenSaverMinimal', 'cymatics-firetv'],
  'interests': ['interests2025', 'marginalia'],
  'research': ['research', 'arxiv-paper', 'inside_the_math', 'peripheral-color', 'science-agent'],
  'creative-coding': ['pixelbop', 'liquid-light-warp', 'iblipper2025', 'oriented-dog-phase1'],
  'session-tools': ['claude-code-session-bridge', 'session-bridge', 'claude-code-history-viewer', 'c9watch'],
  'clicksense': ['clicksense', 'fovi'],
  'sciprogfi': ['sciprogfi', 'sciprogfi-web'],
  'andyed': ['andyed', 'unknown', 'blog'],
};

const COLORS = {
  'scrutinizer': '#e06c75',
  'psychodeli': '#c678dd',
  'oled-fireworks': '#e5c07b',
  'interests': '#56b6c2',
  'research': '#61afef',
  'creative-coding': '#d19a66',
  'session-tools': '#98c379',
  'clicksense': '#ff6b9d',
  'sciprogfi': '#c3a6ff',
  'andyed': '#5c6370',
  'other': '#3e4451',
};

// Build reverse map
const projectToGroup = {};
for (const [group, members] of Object.entries(PROJECT_GROUPS)) {
  for (const m of members) projectToGroup[m] = group;
}

// Process data
const days = RAW_DATA.days.map(d => {
  const grouped = {};
  for (const p of d.projects) {
    const group = projectToGroup[p.project] || 'other';
    grouped[group] = (grouped[group] || 0) + p.count;
  }
  return { day: d.day, ...grouped };
});

const groups = Object.keys(COLORS);
const allDays = days.map(d => d.day).sort();

// Fill missing days
const daySet = new Set(allDays);
const startDate = new Date(allDays[0]);
const endDate = new Date(allDays[allDays.length - 1]);
const filledDays = [];
for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
  const ds = d.toISOString().split('T')[0];
  const existing = days.find(x => x.day === ds);
  const row = { day: ds };
  for (const g of groups) row[g] = existing ? (existing[g] || 0) : 0;
  filledDays.push(row);
}

// --- Stacked area chart ---
const svg = document.getElementById('chart');
const margin = { top: 20, right: 32, bottom: 30, left: 50 };
const W = window.innerWidth;
const H = 420;
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

const chartW = W - margin.left - margin.right;
const chartH = H - margin.top - margin.bottom;

// Compute stacked values
const stacked = filledDays.map(d => {
  let y0 = 0;
  const layers = {};
  for (const g of groups) {
    const v = d[g] || 0;
    layers[g] = { y0, y1: y0 + v };
    y0 += v;
  }
  return { day: d.day, layers, total: y0 };
});

const maxY = Math.max(...stacked.map(d => d.total), 1);

function x(i) { return margin.left + (i / (stacked.length - 1)) * chartW; }
function y(v) { return margin.top + chartH - (v / maxY) * chartH; }

// Draw areas (bottom to top)
let svgContent = '';

// Grid lines
for (let v = 0; v <= maxY; v += 50) {
  const yy = y(v);
  svgContent += `<line x1="${margin.left}" y1="${yy}" x2="${W - margin.right}" y2="${yy}" stroke="#1a1a2e" stroke-width="1"/>`;
  svgContent += `<text x="${margin.left - 8}" y="${yy + 4}" fill="#555" font-size="10" text-anchor="end">${v}</text>`;
}

// X-axis labels
for (let i = 0; i < stacked.length; i++) {
  if (i % 3 === 0) {
    const label = stacked[i].day.slice(5); // MM-DD
    svgContent += `<text x="${x(i)}" y="${H - 4}" fill="#555" font-size="10" text-anchor="middle">${label}</text>`;
  }
}

// Area paths with smooth curves
for (const g of groups) {
  const color = COLORS[g];
  // Build path
  let pathTop = '';
  let pathBottom = '';
  for (let i = 0; i < stacked.length; i++) {
    const xi = x(i);
    const layer = stacked[i].layers[g];
    if (i === 0) {
      pathTop += `M${xi},${y(layer.y1)}`;
      pathBottom = `L${xi},${y(layer.y0)}`;
    } else {
      pathTop += `L${xi},${y(layer.y1)}`;
      pathBottom = `L${x(stacked.length - 1 - (stacked.length - 1 - i))},${y(layer.y0)}` + pathBottom.slice(1);
    }
  }
  // Close: go back along bottom
  let bottomPath = '';
  for (let i = stacked.length - 1; i >= 0; i--) {
    bottomPath += `L${x(i)},${y(stacked[i].layers[g].y0)}`;
  }
  svgContent += `<path d="${pathTop}${bottomPath}Z" fill="${color}" opacity="0.75" data-group="${g}"/>`;
}

// Hover columns
for (let i = 0; i < stacked.length; i++) {
  const colW = chartW / stacked.length;
  svgContent += `<rect x="${x(i) - colW/2}" y="${margin.top}" width="${colW}" height="${chartH}" fill="transparent" data-idx="${i}" class="hover-col"/>`;
}

svg.innerHTML = svgContent;

// Legend
const legendEl = document.getElementById('legend');
const totals = {};
for (const g of groups) totals[g] = filledDays.reduce((s, d) => s + (d[g] || 0), 0);
const sortedGroups = [...groups].sort((a, b) => totals[b] - totals[a]);

for (const g of sortedGroups) {
  if (totals[g] === 0) continue;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-swatch" style="background:${COLORS[g]}"></div>${g} (${totals[g]})`;
  legendEl.appendChild(item);
}

// Tooltip
const tooltip = document.getElementById('tooltip');
svg.addEventListener('mousemove', e => {
  const rect = svg.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width * W;
  const idx = Math.round(((mx - margin.left) / chartW) * (stacked.length - 1));
  if (idx < 0 || idx >= stacked.length) { tooltip.style.display = 'none'; return; }
  const d = stacked[idx];
  const dayStr = new Date(d.day + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  let rows = '';
  for (const g of sortedGroups) {
    const v = (d.layers[g].y1 - d.layers[g].y0);
    if (v === 0) continue;
    rows += `<div class="row"><span><span class="legend-swatch" style="background:${COLORS[g]};display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px"></span>${g}</span><span class="count">${v}</span></div>`;
  }
  tooltip.innerHTML = `<div class="day">${dayStr} &mdash; ${d.total} events</div>${rows}`;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY - 20) + 'px';
  if (e.clientX > window.innerWidth - 250) tooltip.style.left = (e.clientX - 220) + 'px';
});
svg.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// --- Bar chart ---
const barChart = document.getElementById('bar-chart');
const maxTotal = Math.max(...Object.values(totals));
for (const g of sortedGroups) {
  if (totals[g] === 0) continue;
  const pct = (totals[g] / maxTotal) * 100;
  const row = document.createElement('div');
  row.className = 'bar-row';
  row.innerHTML = `
    <div class="bar-label">${g}</div>
    <div class="bar-track">
      <div class="bar-fill" style="width:${pct}%;background:${COLORS[g]}"></div>
      <div class="bar-count">${totals[g]}</div>
    </div>`;
  barChart.appendChild(row);
}

// --- Heatmap ---
const heatmapEl = document.getElementById('heatmap');
const topGroups = sortedGroups.slice(0, 7);
const grid = document.createElement('div');
grid.style.display = 'flex';

// Row labels
const labelCol = document.createElement('div');
labelCol.className = 'heatmap-col';
labelCol.innerHTML = '<div class="heatmap-cell" style="background:transparent"></div>';
for (const g of topGroups) {
  const label = document.createElement('div');
  label.className = 'heatmap-row-label';
  label.style.height = '22px';
  label.textContent = g;
  labelCol.appendChild(label);
}
grid.appendChild(labelCol);

// Day columns
for (const d of filledDays) {
  const col = document.createElement('div');
  col.className = 'heatmap-col';
  // Date header
  const header = document.createElement('div');
  header.className = 'heatmap-label';
  header.textContent = parseInt(d.day.slice(8));
  col.appendChild(header);

  for (const g of topGroups) {
    const v = d[g] || 0;
    const cell = document.createElement('div');
    cell.className = 'heatmap-cell';
    const intensity = Math.min(v / 40, 1);
    const color = COLORS[g];
    // Parse hex color and apply intensity
    const r = parseInt(color.slice(1,3), 16);
    const gn = parseInt(color.slice(3,5), 16);
    const b = parseInt(color.slice(5,7), 16);
    const bg = intensity === 0 ? '#151520'
      : `rgb(${Math.round(r * intensity + 20 * (1-intensity))}, ${Math.round(gn * intensity + 20 * (1-intensity))}, ${Math.round(b * intensity + 20 * (1-intensity))})`;
    cell.style.background = bg;
    cell.title = `${d.day}: ${g} = ${v}`;
    col.appendChild(cell);
  }
  grid.appendChild(col);
}
heatmapEl.appendChild(grid);
</script>
</body>
</html>
